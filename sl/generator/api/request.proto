syntax = "proto3";

package sunlight.api;

message AuthenticationRequest
{
    string id = 1;
    string password = 2;
}

message AccountCreationReuqest
{
    string id = 1;
    string password = 2;
    int32 gm_level = 3;
}

message Request
{
    int32 request_id = 1;

    oneof payload
    {
        AuthenticationRequest authentication = 100;
        AccountCreationReuqest account_creation = 101;

    }
}
